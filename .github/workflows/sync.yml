name: Sync releases from source

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-release]
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}
  SOURCE_REPO: 'vichhka-git/magisk-renef'

jobs:
  get_tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.check.outputs.tags }}
      latest: ${{ steps.check.outputs.latest }}
    steps:
      - name: Compare tags
        id: check
        run: |
          # Tags permanently blocked on mirror (immutability)
          BLOCKED="v0.3.3 v0.3.4 v0.3.6"

          SOURCE_TAGS=$(gh api repos/$SOURCE_REPO/tags | jq -r '.[].name' | sort)
          CURRENT_TAGS=$(gh api repos/$GITHUB_REPOSITORY/tags | jq -r '.[].name' | sort)

          FILTERED_SOURCE=$(echo "$SOURCE_TAGS" | grep -v -w "$BLOCKED" || true)

          MISSING=$(comm -23 <(echo "$FILTERED_SOURCE") <(echo "$CURRENT_TAGS") || true)
          MISSING_JSON=$(echo "$MISSING" | jq -R -s -c 'split("\n")[:-1] | map(select(. != ""))')
          echo "tags=$MISSING_JSON" >> $GITHUB_OUTPUT

          LATEST=$(echo "$SOURCE_TAGS" | tail -1)
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  release:
    needs: get_tags
    if: needs.get_tags.outputs.tags != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ${{ fromJson(needs.get_tags.outputs.tags) }}
      fail-fast: false
    steps:
      - name: Download asset from source
        run: |
          # Get the zip filename from source release
          ZIP_NAME=$(gh release view ${{ matrix.tag }} --repo $SOURCE_REPO --json assets -q '.assets[0].name')
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

          gh release download ${{ matrix.tag }} --repo $SOURCE_REPO --pattern "${ZIP_NAME}"
          echo "Downloaded: $ZIP_NAME"

      - name: Create release with asset
        run: |
          TAG="${{ matrix.tag }}"
          IS_LATEST="${{ matrix.tag == needs.get_tags.outputs.latest }}"

          # Get release body from source
          BODY=$(gh release view "$TAG" --repo $SOURCE_REPO --json body -q .body)

          if [ "$IS_LATEST" = "true" ]; then
            gh release create "$TAG" "$ZIP_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "MagiskRenef $TAG" \
              --notes "$BODY" \
              --latest
          else
            gh release create "$TAG" "$ZIP_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "MagiskRenef $TAG" \
              --notes "$BODY"
          fi
